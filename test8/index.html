<!DOCTYPE html>
<html>
<head>
    <title>Pokédex Catalog</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Pokédex Catalog</h2>




<input type="number" id="minPower" placeholder="Min Power">
<input type="number" id="maxPower" placeholder="Max Power">

<button id="applyFilter">Apply Filter</button>


<table id="pokemonTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Trainer</th>
            <th>Type</th>
            <th>Power</th>
            <th>Region</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
